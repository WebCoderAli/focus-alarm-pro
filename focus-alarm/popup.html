<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Focus Alarm Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Focus Alarm</h2>

<label>Select tabs to KEEP open</label>

<div id="tabsContainer"></div>

<input type="number" id="minutes" placeholder="Enter minutes">

<div class="buttons">
<button id="startTimer">Start Timer</button>
<button id="cancelTimer">Cancel</button>
</div>

<div class="timerBox">
<p id="countdown">Timer not started</p>
</div>

</div>

<script src="popup.js"></script>

</body>

</html>
